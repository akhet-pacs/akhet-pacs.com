<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="slice-soft" cx="50%" cy="45%" r="62%">
      <stop offset="0%" stop-color="#7f7f7f" />
      <stop offset="70%" stop-color="#6f6f6f" />
      <stop offset="100%" stop-color="#585858" />
    </radialGradient>
    <radialGradient id="slice-lung" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#191919" />
      <stop offset="100%" stop-color="#3a3a3a" />
    </radialGradient>
    <radialGradient id="slice-heart" cx="42%" cy="35%" r="72%">
      <stop offset="0%" stop-color="#9a9a9a" />
      <stop offset="100%" stop-color="#787878" />
    </radialGradient>
    <filter id="slice-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="11" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.11" />
      </feComponentTransfer>
    </filter>
    <filter id="slice-soften" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.4" />
    </filter>
    <filter id="slice-edge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" />
    </filter>
    <clipPath id="slice-body">
      <ellipse cx="256" cy="268" rx="192" ry="148" />
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="#070707" />

  <g clip-path="url(#slice-body)">
    <ellipse cx="256" cy="268" rx="192" ry="148" fill="url(#slice-soft)" />

    <g filter="url(#slice-soften)">
      <ellipse cx="164" cy="262" rx="70" ry="92" fill="url(#slice-lung)" />
      <ellipse cx="348" cy="262" rx="70" ry="92" fill="url(#slice-lung)" />
      <ellipse cx="238" cy="292" rx="60" ry="54" fill="url(#slice-heart)" />
      <ellipse cx="272" cy="222" rx="26" ry="22" fill="#9e9e9e" />
      <ellipse cx="232" cy="212" rx="17" ry="15" fill="#8b8b8b" />
    </g>

    <g filter="url(#slice-edge)">
      <rect x="234" y="146" width="44" height="13" rx="6" fill="#d2d2d2" opacity="0.8" />
      <path d="M238 362 h36 l13 19 -10 21 h-42 l-10 -21 z" fill="#dedede" />
      <ellipse cx="256" cy="382" rx="11" ry="9" fill="#262626" />
      <path
        d="M218 378 l-24 -13 M294 378 l24 -13"
        stroke="#d4d4d4"
        stroke-width="7"
        stroke-linecap="round"
        fill="none"
      />
    </g>

    <ellipse
      cx="256"
      cy="268"
      rx="176"
      ry="133"
      fill="none"
      stroke="#e2e2e2"
      stroke-width="7"
      stroke-linecap="round"
      stroke-dasharray="13 41"
      stroke-dashoffset="8"
      opacity="0.5"
      filter="url(#slice-edge)"
    />

    <rect width="512" height="512" filter="url(#slice-grain)" opacity="0.6" />
  </g>

  <ellipse
    cx="256"
    cy="268"
    rx="192"
    ry="148"
    fill="none"
    stroke="#b6b6b6"
    stroke-width="7"
    opacity="0.7"
  />
</svg>
